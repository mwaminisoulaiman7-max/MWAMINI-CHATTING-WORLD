<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MWAMINI CHATTING World</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="auth-screen" class="screen">
    <div class="auth-container">
      <h1>MWAMINI CHATTING</h1>
      <div id="auth-error" class="error-msg hidden"></div>
      <form id="auth-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <div id="signup-fields" class="hidden">
          <input type="text" id="username" placeholder="Username (unique)">
          <input type="text" id="full_name" placeholder="Full Name">
        </div>
        <button type="submit" id="auth-btn">Login</button>
      </form>
      <p id="toggle-auth">Need an account? <span>Register here</span></p>
    </div>
  </div>

  <div id="chat-screen" class="screen hidden">
    <div class="sidebar">
      <div class="sidebar-header">
        <div style="display: flex; align-items: center; gap: 10px;">
          <img id="my-profile-avatar" src="https://via.placeholder.com/40" class="status-img-thumb" style="cursor: pointer; width: 35px; height: 35px;" title="Click to manage profile photo">
          <input type="file" id="profile-image-upload" accept="image/*" class="hidden">
          <div style="display: flex; flex-direction: column;">
            <h3 id="my-profile-name" style="margin-bottom: 2px; font-size: 1rem;">My Profile</h3>
            <span id="my-profile-username" style="font-size: 0.75rem; color: var(--accent); cursor: pointer;" title="Click to change username">@username ✏️</span>
          </div>
        </div>
        <button id="logout-btn">Logout</button>
      </div>
      <div class="app-nav">
        <button class="nav-btn active" id="nav-chats">Chats</button>
        <button class="nav-btn" id="nav-groups">Groups</button>
        <button class="nav-btn" id="nav-status">Status</button>
      </div>
      
      <div id="panel-chats" class="nav-panel">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Search username...">
          <button id="search-btn" aria-label="Search">🔍</button>
        </div>
        <div id="user-list" class="user-list"></div>
      </div>
      
      <div id="panel-groups" class="nav-panel hidden">
        <div class="action-bar">
          <button id="create-group-btn" class="action-btn">+ New Group</button>
        </div>
        <div id="group-list" class="user-list"></div>
      </div>
      
      <div id="panel-status" class="nav-panel hidden">
        <div class="action-bar" style="gap: 5px;">
          <button id="add-photo-status-btn" class="action-btn" style="flex: 1;">📷 Photo</button>
          <button id="add-text-status-btn" class="action-btn" style="flex: 1;">✏️ Text</button>
          <input type="file" id="status-image-upload" accept="image/*" class="hidden">
        </div>
        
        <div id="text-status-container" class="hidden" style="padding: 10px; background: var(--bg-dark); display: flex; gap: 10px; border-bottom: 1px solid var(--border);">
          <input type="text" id="text-status-input" placeholder="What's on your mind?" style="flex: 1; padding: 8px; border-radius: 4px; border: none; background: var(--bg-panel); color: var(--text-primary);">
          <button id="submit-text-status-btn" style="background: var(--accent); color: white; border: none; border-radius: 4px; padding: 0 15px; cursor: pointer; font-weight: bold;">Post</button>
        </div>
        
        <div id="status-list" class="user-list"></div>
      </div>
    </div>

    <div class="chat-area">
      <div class="chat-header" id="chat-header">
        <div class="header-info" style="display: flex; align-items: center; gap: 10px; flex: 1;">
          <img id="active-chat-avatar" class="status-img-thumb hidden" style="width: 40px; height: 40px;" src="">
          <div>
            <h3 id="active-chat-name">Select a user to start chatting</h3>
            <div class="status-container">
              <span id="active-chat-status" class="status-text hidden">Offline</span>
              <span id="typing-indicator" class="status-text typing hidden">typing...</span>
            </div>
          </div>
        </div>
        
        <div id="call-actions" class="hidden" style="display: flex; gap: 10px; margin-right: 15px;">
          <button id="audio-call-btn" class="action-btn" style="padding: 6px 12px;" title="Audio Call">📞</button>
          <button id="video-call-btn" class="action-btn" style="padding: 6px 12px;" title="Video Call">📹</button>
        </div>

        <div id="group-actions" class="hidden" style="display: flex; gap: 5px;">
          <button id="group-avatar-btn" class="action-btn" style="padding: 6px 8px; font-size: 0.8rem;" title="Change Group Photo">📷 Photo</button>
          <input type="file" id="group-avatar-upload" accept="image/*" class="hidden">
          <button id="group-manage-btn" class="action-btn" style="padding: 6px 8px; font-size: 0.8rem;">Manage Requests</button>
          <button id="group-delete-btn" class="action-btn" style="padding: 6px 8px; font-size: 0.8rem; border-color: #ef5350; color: #ef5350;">Delete Group</button>
        </div>
      </div>

      <div class="messages-container" id="messages-container"></div>
      
      <form id="message-form" class="message-input-area hidden">
        <label for="file-upload" class="attach-btn" style="cursor: pointer;" title="Attach Image, Video or PDF">📎</label>
        <input type="file" id="file-upload" accept="image/*,video/*,application/pdf" class="hidden">
        
        <button type="button" id="record-voice-btn" class="record-btn" title="Click to Record Voice Note">🎤</button>
        <span id="record-timer" class="hidden" style="color: var(--danger); font-size: 0.8rem; font-weight: bold; width: 40px;">0:00</span>
        
        <div id="upload-preview" class="hidden">Uploading...</div>
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
        <button type="submit" id="send-btn">Send</button>
      </form>
    </div>
  </div>

  <div id="status-viewer" class="status-modal hidden">
    <button class="status-modal-close" id="status-viewer-close">×</button>
    <div class="status-modal-content">
      <div id="status-viewer-header" style="color: var(--text-secondary); margin-bottom: 10px; font-weight: bold;"></div>
      <img id="status-viewer-img" class="status-modal-img hidden" src="" alt="Status Media">
      <div id="status-viewer-text" class="status-modal-text hidden"></div>
    </div>
  </div>

  <div id="call-modal" class="status-modal hidden">
    <div class="status-modal-content" style="background: var(--bg-panel); padding: 20px; border-radius: 12px; width: 100%; max-width: 600px; position: relative;">
      <h2 id="call-title" style="color: white; margin-bottom: 5px;">Calling...</h2>
      <div id="call-timer-display" style="margin-bottom: 15px; color: var(--accent); font-weight: bold;">00:00</div>
      
      <div style="position: relative; display: flex; justify-content: center; align-items: center; background: black; border-radius: 8px; min-height: 200px; margin-bottom: 15px;">
        <video id="remote-video" autoplay playsinline style="width: 100%; max-height: 450px; border-radius: 8px;"></video>
        <video id="local-video" autoplay playsinline muted style="width: 120px; position: absolute; bottom: 10px; right: 10px; border-radius: 8px; border: 2px solid var(--accent); box-shadow: 0 4px 8px rgba(0,0,0,0.5);"></video>
      </div>

      <div style="display: flex; justify-content: center; gap: 15px;">
        <button id="call-accept-btn" class="action-btn hidden" style="background: var(--accent); color: white; width: 120px;">📞 Accept</button>
        <button id="call-mute-btn" class="action-btn" style="width: auto; padding: 10px 20px;">🎤 Mute</button>
        <button id="call-cam-btn" class="action-btn" style="width: auto; padding: 10px 20px;">📹 Cam Off</button>
        <button id="call-end-btn" class="action-btn" style="background: var(--danger); color: white; width: auto; border: none; padding: 10px 20px;">End Call</button>
      </div>
    </div>
  </div>

  <script src="https://webrtc.github.io/adapter/adapter-latest.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
