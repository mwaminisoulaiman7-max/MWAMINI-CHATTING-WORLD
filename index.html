<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mwamini Mobile Chat Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="screen">
        <div id="auth-screen" class="auth-viewport">
            <div class="auth-box">
                <h2>MWAMINI PORTAL</h2>
                <div id="auth-error" class="error-msg hidden"></div>
                <form id="auth-form">
                    <input type="email" id="email" placeholder="Email Address" required>
                    <input type="password" id="password" placeholder="Password" required>
                    
                    <div id="signup-fields" class="hidden">
                        <input type="text" id="username" placeholder="Unique Username">
                        <input type="text" id="full_name" placeholder="Display Full Name">
                    </div>
                    
                    <button type="submit" id="auth-btn">Login</button>
                </form>
                <div id="toggle-auth">
                    Need an account? <span>Register here</span>
                </div>
            </div>
        </div>

        <div id="chat-screen" class="app-viewport hidden">
            
            <div class="sidebar">
                <div class="sidebar-header">
                    <span id="my-profile-name" class="profile-title">My Chat</span>
                    <button id="logout-btn" class="nav-action-btn logout">Logout</button>
                </div>
                
                <div class="app-nav-tabs">
                    <button id="nav-chats" class="nav-tab active">Chats</button>
                    <button id="nav-groups" class="nav-tab">Groups</button>
                    <button id="nav-status" class="nav-tab">Status</button>
                </div>

                <div class="search-wrapper">
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="Search usernames...">
                        <button id="search-btn">🔍</button>
                    </div>
                    <div id="search-history-container" class="search-history-container"></div>
                    <button id="clear-search-btn" class="clear-history-btn">Clear History ✖</button>
                </div>

                <div id="panel-chats" class="nav-panel">
                    <div id="user-list" class="items-list"></div>
                </div>
                
                <div id="panel-groups" class="nav-panel hidden">
                    <div class="action-bar">
                        <button id="create-group-btn" class="action-btn">+ Create New Group</button>
                    </div>
                    <div id="group-list" class="items-list"></div>
                </div>

                <div id="panel-status" class="nav-panel hidden">
                    <div class="status-panel-body">
                        <button id="add-status-btn" class="action-btn">+ Update Status</button>
                        <div id="my-status-display" class="my-status-card">Current Status: Online</div>
                    </div>
                </div>
            </div>

            <div class="chat-area mobile-hidden">
                <div class="chat-header">
                    <div class="header-left">
                        <button id="mobile-back-btn" class="nav-action-btn back-btn">⬅ Back</button>
                        <div class="user-meta-info">
                            <div id="active-chat-name" class="active-title">Select context</div>
                            <div id="active-chat-status" class="status-text hidden">Offline</div>
                            <div id="typing-indicator" class="typing hidden">typing...</div>
                        </div>
                    </div>
                    <div class="header-right">
                        <div id="group-actions" class="hidden">
                            <button id="group-manage-btn" class="nav-action-btn">Requests</button>
                            <button id="group-delete-btn" class="nav-action-btn danger">Delete</button>
                        </div>
                        <button id="chat-logout-btn" class="nav-action-btn logout">Logout</button>
                    </div>
                </div>

                <div id="messages-container" class="messages-container"></div>

                <form id="message-form" class="message-input-area hidden">
                    <label for="image-upload" class="attach-btn">📎</label>
                    <input type="file" id="image-upload" accept="image/*" class="hidden">
                    <span id="upload-preview" class="hidden">✔ File</span>
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button type="submit" id="send-btn">Send</button>
                </form>
            </div>

        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
