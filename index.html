<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MWAMINI CHATTING World</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="auth-screen" class="screen">
    <div class="auth-container">
      <h1>MWAMINI CHATTING</h1>
      <div id="auth-error" class="error-msg hidden"></div>
      <form id="auth-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <div id="signup-fields" class="hidden">
          <input type="text" id="username" placeholder="Username (unique)">
          <input type="text" id="full_name" placeholder="Full Name">
        </div>
        <button type="submit" id="auth-btn">Login</button>
      </form>
      <p id="toggle-auth">Need an account? <span>Register here</span></p>
    </div>
  </div>

  <div id="chat-screen" class="screen hidden">
    <div class="sidebar">
      <div class="sidebar-header">
        <div style="display: flex; align-items: center; gap: 10px;">
          <img id="my-profile-avatar" src="https://via.placeholder.com/40" class="status-img-thumb" style="cursor: pointer; width: 35px; height: 35px;" title="Click to manage profile photo">
          <input type="file" id="profile-image-upload" accept="image/*" class="hidden">
          <h3 id="my-profile-name">My Profile</h3>
        </div>
        <button id="logout-btn">Logout</button>
      </div>
      <div class="app-nav">
        <button class="nav-btn active" id="nav-chats">Chats</button>
        <button class="nav-btn" id="nav-groups">Groups</button>
        <button class="nav-btn" id="nav-status">Status</button>
      </div>
      
      <div id="panel-chats" class="nav-panel">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Search username...">
          <button id="search-btn" aria-label="Search">🔍</button>
        </div>
        <div id="user-list" class="user-list"></div>
      </div>
      
      <div id="panel-groups" class="nav-panel hidden">
        <div class="action-bar">
          <button id="create-group-btn" class="action-btn">+ New Group</button>
        </div>
        <div id="group-list" class="user-list"></div>
      </div>
      
      <div id="panel-status" class="nav-panel hidden">
        <div class="action-bar" style="gap: 5px;">
          <button id="add-photo-status-btn" class="action-btn" style="flex: 1;">📷 Photo</button>
          <button id="add-text-status-btn" class="action-btn" style="flex: 1;">✏️ Text</button>
          <input type="file" id="status-image-upload" accept="image/*" class="hidden">
        </div>
        
        <div id="text-status-container" class="hidden" style="padding: 10px; background: var(--bg-dark); display: flex; gap: 10px; border-bottom: 1px solid var(--border);">
          <input type="text" id="text-status-input" placeholder="What's on your mind?" style="flex: 1; padding: 8px; border-radius: 4px; border: none; background: var(--bg-panel); color: var(--text-primary);">
          <button id="submit-text-status-btn" style="background: var(--accent); color: white; border: none; border-radius: 4px; padding: 0 15px; cursor: pointer; font-weight: bold;">Post</button>
        </div>
        
        <div id="status-list" class="user-list"></div>
      </div>
    </div>

    <div class="chat-area">
      <div class="chat-header" id="chat-header">
        <div class="header-info" style="display: flex; align-items: center; gap: 10px;">
          <img id="active-chat-avatar" class="status-img-thumb hidden" style="width: 40px; height: 40px;" src="">
          <div>
            <h3 id="active-chat-name">Select a user to start chatting</h3>
            <div class="status-container">
              <span id="active-chat-status" class="status-text hidden">Offline</span>
              <span id="typing-indicator" class="status-text typing hidden">typing...</span>
            </div>
          </div>
        </div>
        <div id="group-actions" class="hidden" style="display: flex; gap: 5px; margin-left: auto;">
          <button id="group-avatar-btn" class="action-btn" style="padding: 6px 8px; font-size: 0.8rem;" title="Change Group Photo">📷 Photo</button>
          <input type="file" id="group-avatar-upload" accept="image/*" class="hidden">
          <button id="group-manage-btn" class="action-btn" style="padding: 6px 8px; font-size: 0.8rem;">Manage Requests</button>
          <button id="group-delete-btn" class="action-btn" style="padding: 6px 8px; font-size: 0.8rem; border-color: #ef5350; color: #ef5350;">Delete Group</button>
        </div>
      </div>

      <div class="messages-container" id="messages-container"></div>
      
      <form id="message-form" class="message-input-area hidden">
        <label for="image-upload" class="attach-btn" style="cursor: pointer;">📎</label>
        <input type="file" id="image-upload" accept="image/*" class="hidden">
        <div id="upload-preview" class="hidden">Uploading...</div>
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
        <button type="submit" id="send-btn">Send</button>
      </form>
    </div>
  </div>

  <div id="status-viewer" class="status-modal hidden">
    <button class="status-modal-close" id="status-viewer-close">×</button>
    <div class="status-modal-content">
      <div id="status-viewer-header" style="color: var(--text-secondary); margin-bottom: 10px; font-weight: bold;"></div>
      <img id="status-viewer-img" class="status-modal-img hidden" src="" alt="Status Media">
      <div id="status-viewer-text" class="status-modal-text hidden"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
